networks:
  tango-net:
    name: tango-net
    driver: bridge
  tine:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24

volumes:
  mariadb_data:
  prometheus_data:
  grafana_data:

services:
  # ── TINE sine-wave test device server ────────────────────────────────────────
  # Standalone — no ENS required.
  # Exports Sine, Amplitude, Frequency, Noise on 10 devices (SINEDEV_0…SINEDEV_9).
  #
  # Context: TEST  |  Server: JSINESRV  |  Devices: SINEDEV_0..SINEDEV_9
  # Client address: /TEST/JSINESRV/SINEDEV_0
  jsinesrv:
    build:
      context: docker/
    image: rxtine-testserver:latest
    container_name: jsinesrv
    networks:
      tine:
        ipv4_address: 172.25.0.11
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "nc", "-z", "172.25.0.11", "8503" ]
      interval: 5s
      timeout: 3s
      retries: 10

  status-server-db:
    image: mariadb:11
    container_name: status-server-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: statusserver
      MYSQL_USER: ss
      MYSQL_PASSWORD: ss
    ports:
      - "3306:3306"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  tango-db:
    image: artefact.skao.int/ska-tango-images-tango-db:11.8.3
    platform: linux/x86_64
    networks:
      - tango-net
    environment:
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_DATABASE=tango
      - MARIADB_USER=tango
      - MARIADB_PASSWORD=tango
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      start_period: 10s
      interval: 500ms
      timeout: 1s
      retries: 3

  tango-dbds:
    image: artefact.skao.int/ska-tango-images-tango-databaseds:5.26.1
    platform: linux/x86_64
    networks:
      - tango-net
    ports:
      - "10000:10000"
    environment:
      - TANGO_HOST=localhost:10000
      - MYSQL_HOST=tango-db:3306
      - MYSQL_USER=tango
      - MYSQL_PASSWORD=tango
      - MYSQL_DATABASE=tango
    depends_on:
      tango-db:
        condition: service_healthy
    entrypoint: Databaseds
    command:
      - "2"
      - -ORBendPoint
      - giop:tcp::10000
    healthcheck:
      test: ["CMD", "sh", "-c", "/usr/local/bin/tango_admin --ping-database || exit 1"]
      start_period: 10s
      start_interval: 500ms
      timeout: 3s
      retries: 3

  tango-test:
    image: artefact.skao.int/ska-tango-images-tango-test:3.12.1
    platform: linux/x86_64
    networks:
      - tango-net
    environment:
      - TANGO_HOST=tango-dbds:10000
    depends_on:
      tango-dbds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "/usr/local/bin/tango_admin --ping-device sys/tg_test/1 || exit 1"]
      start_period: 10s
      start_interval: 500ms
      timeout: 1s
      retries: 3
    command:
      - "test"

  tango-rest:
    image: artefact.skao.int/ska-tango-images-rest-server:1.22.5
    platform: linux/x86_64
    networks:
      - tango-net
    environment:
      - TANGO_HOST=tango-dbds:10000
    ports:
      - "8080:8080"
    depends_on:
      tango-dbds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "/usr/local/bin/tango_admin --ping-device sys/rest/0 || exit 1"]
      start_period: 10s
      start_interval: 500ms
      timeout: 1s
      retries: 3
    command:
      - "rest"

  prometheus:
    image: prom/prometheus:latest
    container_name: local-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: local-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin